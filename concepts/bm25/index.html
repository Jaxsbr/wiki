<script>window.__MD__ = "# BM25 (Best Matching 25)\n\nBM25 is a probabilistic ranking function and the default scorer in Elasticsearch, OpenSearch,\nand most classical search engines. It succeeds precisely where vector embeddings fail: exact\nand rare-token matching.\n\n## Three Mechanisms\n\n### 1. Inverse Document Frequency (IDF)\nMeasures how rare a term is across the corpus. Common words (\"service\", \"deployment\") receive\nlow weight. Rare, distinguishing tokens (\"v3.2\", `ERR_PAYMENT_GATEWAY_TIMEOUT`, `payment_v2_enforce`)\nreceive high weight. This is why BM25 outperforms embeddings on exact-match queries — it most\nheavily weights the tokens that actually distinguish one document from another.\n\n### 2. Term Frequency (TF) Saturation\nThe first mention of a term significantly boosts the score; subsequent mentions yield\ndiminishing returns (score approaches a ceiling rather than growing linearly). Prevents\nkeyword-stuffed documents from gaming the ranking.\n\n### 3. Length Normalisation\nCorrects for the bias where longer documents score higher simply by having more words.\nRelevance is measured by how often a term appears *relative to document length*, not\nin absolute terms. Especially important when indexing variable-length chunks.\n\n## When BM25 Wins\n\n- Error codes pasted verbatim from logs\n- Version strings (`v3.2`, `2019`)\n- Named entities and identifiers that embeddings collapse into neighbourhoods\n- Any query where the distinguishing information is a rare token\n\n## When BM25 Loses\n\n- Conceptual queries with no shared vocabulary (synonyms, paraphrases)\n- Queries that use different words than the document for the same idea\n\n## Relationship to Vector Search\n\nBM25 and cosine similarity are complementary, not competing:\n\n| | BM25 | Vector / Cosine |\n|---|---|---|\n| Strength | Exact & rare-token matching | Semantic / conceptual matching |\n| Scores | Unbounded | Bounded [−1, 1] |\n| Normalisation | Not needed (rank-based fusion via [RRF](/wiki/concepts/reciprocal-rank-fusion/)) | Needed for direct combination |\n\n## See Also\n\n- [Reciprocal Rank Fusion](/wiki/concepts/reciprocal-rank-fusion/) — how BM25 and vector ranks are combined\n- [Vector Search — Hybrid Retrieval](/wiki/topics/vector-search-hybrid-retrieval/)\n";</script>

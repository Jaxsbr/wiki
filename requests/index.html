<script>window.__MD__ = "# Research Requests\n\nRegistry of every research request Jaco makes. **Before starting any new\nresearch, scan this list.** If a request looks the same as or similar to an\nearlier one, confirm with Jaco first: does he mean the same thing as before\n(just link the existing pages), an amendment to it, or genuinely new work?\n\nEntry format:\n\n```\n## R-NNN — \u003cshort title>\n- **Date:** YYYY-MM-DD\n- **Request:** what Jaco asked, verbatim or close paraphrase\n- **Status:** open | answered | superseded by R-NNN\n- **Pages:** [page](/wiki/topics/page/), ...\n```\n\n## R-010 — Context and memory engineering in agentic AI systems\n- **Date:** 2026-07-03\n- **Request:** Deep research on context vs. memory engineering in agentic AI. Base source: machinelearningmastery.com/context-vs-memory-engineering-in-agentic-ai-systems/. Extend with: concrete examples of where/how to apply each, critiques (over-engineered? costly? slow?), and trade-offs between approaches.\n- **Status:** answered\n- **Pages:**\n  - [context-memory-engineering-overview](/wiki/topics/context-memory-engineering-overview/) — hub: two disciplines, retrieval boundary, context rot, failure taxonomy\n  - [context-engineering](/wiki/topics/context-engineering/) — techniques, production examples, compression tools, cost data\n  - [context-engineering-critiques](/wiki/topics/context-engineering-critiques/) — rebrand debate, long context vs RAG, compression backfire, when simpler wins\n  - [agent-memory-engineering](/wiki/topics/agent-memory-engineering/) — 4 memory types with production examples per system\n  - [agent-memory-platforms](/wiki/topics/agent-memory-platforms/) — platform comparison, pricing, latency benchmarks\n  - [agent-memory-critiques](/wiki/topics/agent-memory-critiques/) — security, complexity, staleness, stateless argument\n\n## R-009 — Agentic engineering skill framework: tier spine, branch ladders, self-assessment instrument\n- **Date:** 2026-06-23\n- **Request:** Build a deep knowledge base on the developer→agentic-engineer progression: 7 trunk tiers (T0–T6), 10 orthogonal branch ladders, 6 fluency axes with a deterministic gating rule, a self-administered 24-item instrument, named skew profiles, the two-transition model (T1: prompting fluency → T2: orthogonal delegation shift), terminology disambiguation (vibe coding/agentic engineering/AI Engineer etc.), and the field landscape. Extensive spec provided with seed sources (Karpathy, swyx, Addy Osmani, Simon Willison, Anthropic, arXiv 2506.12469, arXiv 2506.12347, Eleanor Berger, Philipp Schmid, Thoughtworks, and others).\n- **Status:** answered\n- **Pages:**\n  - [agentic-engineering-overview](/wiki/topics/agentic-engineering-overview/) — hub: two transitions, tier map, navigation, guardrails\n  - [agentic-terminology](/wiki/topics/agentic-terminology/) — vibe coding/agentic engineering/AI Engineer; autonomy scales; loop terms; controlled vocabulary\n  - [agentic-tier-spine](/wiki/topics/agentic-tier-spine/) — T0–T6 with indicators, bottlenecks, drills, failure modes\n  - [agentic-orthogonal-shift](/wiki/topics/agentic-orthogonal-shift/) — T3→T4 centerpiece; Six Transition-2 Competencies; both failure poles; crossing drills\n  - [agentic-branch-ladders](/wiki/topics/agentic-branch-ladders/) — 10 branches × 4 rungs; 3 gating branches; jaggedness grid\n  - [agentic-fluency-instrument](/wiki/topics/agentic-fluency-instrument/) — 6 axes; gating rule; 24-item questionnaire; 3 worked examples\n  - [agentic-skew-profiles](/wiki/topics/agentic-skew-profiles/) — Prescriptive-Prose Veteran, Vibe Coder, Cautious Adopter\n  - [agentic-landscape](/wiki/topics/agentic-landscape/) — tool families, brownfield, teams, field direction\n  - [agentic-traction](/wiki/topics/agentic-traction/) — traction matrix; traction assessment; do-vs-delegate discipline\n\n## R-008 — Incremental games: mechanics, recipes, enjoyment, replayability, examples + deep psychology\n- **Date:** 2026-06-17\n- **Request:** Research incremental games — how they work, what makes them enjoyable and replayable (mechanics, recipes, game examples). Expanded 2026-06-17: full structural design reference covering all 10 topic areas per the comprehensive brief.\n- **Status:** answered\n- **Pages (structural design pass — 2026-06-17):**\n  - [incremental-games-overview](/wiki/topics/incremental-games-overview/) — hub: definition, genre spectrum, history timeline 2002–2021, canonical loop diagram; links to all sub-pages\n  - [incremental-games-core-loop](/wiki/topics/incremental-games-core-loop/) — produce→accumulate→spend; \"numbers going up\" as mechanic; time as cost; active/passive income; offline progress\n  - [incremental-games-resources](/wiki/topics/incremental-games-resources/) — currency tiers; generators; conversion chains (Kittens Game); soft caps; diminishing returns\n  - [incremental-games-upgrades](/wiki/topics/incremental-games-upgrades/) — linear/multiplicative/exponential tiers; milestones; tree vs list; psychology of \"one more upgrade\"\n  - [incremental-games-prestige](/wiki/topics/incremental-games-prestige/) — prestige innovation; first-prestige design; currency formulas (5 games); multi-layer systems (AD/CH/RG); anti-frustration design\n  - [incremental-games-scaling](/wiki/topics/incremental-games-scaling/) — big number notation (K/M/B/T, AA/AB, scientific, log); cost curve formulas; walls; bumpy progression; float precision\n  - [incremental-games-automation](/wiki/topics/incremental-games-automation/) — automation arc; 4 unlock pattern types; milestone rewards; achievement types; auto-buyer design\n  - [incremental-games-recipes](/wiki/topics/incremental-games-recipes/) — 7 full structural templates: Cookie Clicker, Antimatter Dimensions, Kittens Game, Universal Paperclips, AdVenture Capitalist, Incremental RPG (Melvor/NGU/CH), A Dark Room\n  - [incremental-games-pacing](/wiki/topics/incremental-games-pacing/) — unlock cadence; mid-game doldrums (causes + solutions); offline catch-up; daily login; end-game problem; session model\n  - [incremental-games-monetization](/wiki/topics/incremental-games-monetization/) — ethical patterns; predatory patterns; designer ethics test; notable clean implementations\n- **Pages (psychology pass — earlier):**\n  - [incremental-game-psychology](/wiki/topics/incremental-game-psychology/) — 10-section psychology analysis with 15 design principles\n  - [concepts/prestige-loop](/wiki/concepts/prestige-loop/) — prestige mechanic: emotional arc, formulas, layered systems, design rules\n  - [concepts/incremental-genre-fusion](/wiki/concepts/incremental-genre-fusion/) — all genre fusions (Melvor/Kittens/A Dark Room/Universal Paperclips/VS) + failure modes + fusion design test\n- **Pages (catalogue pass — 2026-06-17):**\n  - [incremental-games-catalogue](/wiki/topics/incremental-games-catalogue/) — 30-game per-game deep dives: Pioneering/Classic, Browser/PC, Steam, Mobile, Hybrid; Steam IDs, header images, quick-reference table\n  - [incremental-games-mechanics](/wiki/topics/incremental-games-mechanics/) — 7 core mechanics, prestige formula, idle vs. active design, number inflation, genre taxonomy, design quality rubric\n  - [incremental-progression-examples](/wiki/topics/incremental-progression-examples/) — 10 concrete upgrade/prestige sequences with real numbers; prestige formula comparison table\n\n## R-007 — Atomic science for game design: jargon, mechanics, visual direction\n- **Date:** 2026-06-17\n- **Request:** Research atoms and how they work; capture all field jargon. Goals: (1) build a game themed on atoms/protons/electrons with realistic grounding informing fictional parts, (2) capture terms and purpose of things in the atomic realm, (3) capture art and reference imagery/videos that can inform visual direction.\n- **Status:** answered\n- **Pages:**\n  - [atomic-physics-for-game-design](/wiki/topics/atomic-physics-for-game-design/) — hub: jargon quick-reference, four-force table, 19-mechanic design theme index; links to all six deep-dives\n  - [atomic-structure](/wiki/topics/atomic-structure/) — all particles (quarks→muons), shells (K/L/M/N), orbitals (s/p/d/f), nuclear structure\n  - [atomic-behaviors](/wiki/topics/atomic-behaviors/) — four forces, electron excitation/ionization, radioactive decay (α/β/γ), fission/fusion/reactor, bonding\n  - [atomic-quantum](/wiki/topics/atomic-quantum/) — all quantum concepts (superposition, entanglement, tunneling, Pauli exclusion) with mechanic translations\n  - [atomic-energy-radiation](/wiki/topics/atomic-energy-radiation/) — EM spectrum, radiation, dose units, periodic table, 9 key elements for game design\n  - [atomic-visual-design](/wiki/topics/atomic-visual-design/) — Bohr model/orbitals/spectra; Oppenheimer/Kurzgesagt film refs; CPK colors; Cherenkov glow; 4 art directions (Scientific Realism / Retro Atomic / Quantum Abstract / Nuclear Industrial)\n  - [atomic-game-design-catalogue](/wiki/topics/atomic-game-design-catalogue/) — 15 physics games; 10 atomic concepts → concrete mechanics; 7 genre fit ratings; realism spectrum; arena survivor concept \"VALENCE\"\n\n## R-006 — Arena survivor genre: deep knowledge base (art, mechanics, skill)\n- **Date:** 2026-06-15\n- **Request:** Research arena survivor games (Vampire Survivors genre). Determine art styles, perspectives, and visual effects; core mechanics; how player skill is learned and applied. Reference article: reddit.com/r/gamedev/comments/sitab0. Goal: deep knowledge base of how the genre works, what makes it fun and replayable, what art and mechanics work well.\n- **Status:** answered\n- **Pages:**\n  - [topics/arena-survivor-overview](/wiki/topics/arena-survivor-overview/) — synthesis hub: genre formula, key games, design principles\n  - [topics/arena-survivor-visual-design](/wiki/topics/arena-survivor-visual-design/) — art styles, perspectives, VFX, HUD, enemy design\n  - [topics/arena-survivor-mechanics](/wiki/topics/arena-survivor-mechanics/) — core loop, weapons, evolutions, scaling, meta-progression, movement, resources, run modifiers\n  - [topics/arena-survivor-skill-design](/wiki/topics/arena-survivor-skill-design/) — onboarding, skill expression, build theory, difficulty, run-to-run learning, risk/reward, feel\n\n## R-005 — Pixel art top-down scene layout: how game designers place elements\n- **Date:** 2026-06-15\n- **Request:** Research how pixel art top-down games layout scenes — trees, paths, houses, fences, mountains, caves, ocean, rivers, bridges. Goal: train an AI coder to be better at this.\n- **Status:** answered\n- **Pages:** [topics/pixel-art-topdown-scene-layout](/wiki/topics/pixel-art-topdown-scene-layout/)\n- **Sources:** slynyrd-top-down-tiles-1.html, slynyrd-top-down-tiles-2.html, slynyrd-top-down-objects.html\n\n## R-004 — Solo dev success on Steam: average-joe guide and realistic path\n- **Date:** 2026-06-14\n- **Request:** Research indie solo dev Steam successes. How can an average person with basic code/art/story skills make a game? Constraint: few hours/day for a few months. Inspired by the Levasho Reddit hackathon story.\n- **Status:** answered\n- **Pages:** [topics/solo-dev-on-steam](/wiki/topics/solo-dev-on-steam/), [topics/solo-dev-success-stories](/wiki/topics/solo-dev-success-stories/), [concepts/first-game-scope](/wiki/concepts/first-game-scope/)\n- **Sources:** levasho-reddit-hackathon.md, solo-dev-steam-research.md\n\n## R-003 — Indie game contest winners 2020–2026: winning recipes\n- **Date:** 2026-06-13\n- **Request:** Research up to 10 major indie game contests; find top 3 winners per contest for 2020–2026; extract winning patterns across mechanics, art, genre, tech/engines, and other success factors.\n- **Status:** answered\n- **Pages:** [topics/indie-game-contests](/wiki/topics/indie-game-contests/), [topics/indie-contest-winners](/wiki/topics/indie-contest-winners/), [topics/indie-winning-recipes](/wiki/topics/indie-winning-recipes/), [topics/indie-engines-frameworks](/wiki/topics/indie-engines-frameworks/)\n\n## R-002 — AI-slop web design: detectable patterns and anti-slop techniques\n- **Date:** 2026-06-12\n- **Request:** Research AI-generated website tells that humans detect as generic/low-quality, AND approaches for training/guiding AI systems to produce unique, high-quality UX. Project context omitted.\n- **Status:** answered\n- **Pages:** [topics/ai-slop-web-design](/wiki/topics/ai-slop-web-design/), [concepts/ai-slop-visual-patterns](/wiki/concepts/ai-slop-visual-patterns/), [concepts/anti-slop-design-system](/wiki/concepts/anti-slop-design-system/), [concepts/anti-slop-prompting](/wiki/concepts/anti-slop-prompting/)\n- **Source:** ai-slop-research-notes.md\n\n## R-001 — Hybrid retrieval techniques for improving vector search\n- **Date:** 2026-06-10\n- **Request:** Review InfoQ article on hybrid retrieval for RAG; capture generic techniques for improving semantic search beyond basic cosine similarity. Project context omitted.\n- **Status:** answered\n- **Pages:** [topics/vector-search-hybrid-retrieval](/wiki/topics/vector-search-hybrid-retrieval/), [concepts/bm25](/wiki/concepts/bm25/), [concepts/reciprocal-rank-fusion](/wiki/concepts/reciprocal-rank-fusion/), [concepts/cross-encoder-reranking](/wiki/concepts/cross-encoder-reranking/)\n- **Source:** infoq-vector-search-hybrid-retrieval-rag.txt\n";</script>

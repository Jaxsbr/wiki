<script>window.__MD__ = "# Incremental Games: Resource Systems\n\nPart of the [Incremental Games](/wiki/topics/incremental-games-overview/) research set.\n\n---\n\n## Currency Tiers\n\nMost incrementals use a layered currency structure:\n\n### Primary Currency\nThe main resource generated by the core loop. Everything else is derived from or spent on this.\n- Cookie Clicker: **cookies**\n- Clicker Heroes: **gold**\n- Antimatter Dimensions: **antimatter**\n- Kittens Game: **science** (late game hub) / **catnip** (early survival)\n\n### Secondary Currencies\nUnlock specific sub-systems; often require converting primary currency.\n- Cookie Clicker: **milk** (from achievements → CpS bonus), **magic** (wizard tower mini-game)\n- Clicker Heroes: **hero souls** (prestige currency; buys Ancients)\n- Kittens Game: **culture** (unlocks social techs), **faith** (unlocks unicorn branch)\n\n### Prestige Currencies\nEarned only on reset; permanently modify future runs. The genre's most powerful currency type.\n- Cookie Clicker: **heavenly chips** (from ascension; each = +1% permanent CpS)\n- Clicker Heroes: **hero souls** (doubles as both secondary AND prestige currency)\n- Antimatter Dimensions: **Infinity Points** (1st prestige), **Eternity Points** (2nd), **Reality Shards** (3rd)\n- Realm Grinder: **gems** (reincarnation currency), **research** (ascension currency)\n\n---\n\n## Resource Generation Methods\n\n### 1. Manual Clicks\nThe player clicks a button. Generates primary currency at a fixed per-click rate. Rate scales with \"click upgrades.\" Most relevant in early game. Examples: the Cookie (Cookie Clicker), the Big Red Button (A Dark Room).\n\n### 2. Buildings / Generators\nPurchased objects that generate currency per second automatically. The backbone of idle income.\n\nStandard building pattern (Cookie Clicker buildings as canonical example):\n\n| Building | Base Cost | Base CpS | Notes |\n|----------|-----------|----------|-------|\n| Cursor | 15 cookies | 0.1 | Automates clicks |\n| Grandma | 100 | 0.8 | First \"human\" generator |\n| Farm | 1,100 | 8 | Each tier ~10× prior cost |\n| Mine | 12,000 | 47 | Income tier ratio ~1/3 |\n| Factory | 130,000 | 260 | |\n| Bank | 1.4M | 1,400 | |\n| ... | | | (20 buildings total in v2.052) |\n\nThe ~10× cost per tier and ~1/3 income per tier is calibrated so players spend meaningful time at each level before unlocking the next.\n\n### 3. Multipliers\nApplied to generators' base output. Stack multiplicatively.\n- **Building-specific**: \"+50% Grandma CpS\" (only affects one building type)\n- **Global**: \"×2 all production\" (rare; very powerful)\n- **Conditional**: \"×1.01 per building owned\" (scales as game grows)\n- **Prestige**: permanent across runs (e.g. +1% per heavenly chip)\n\n### 4. Generators of Generators (Abstraction Layers)\nThe most powerful structural idea in incrementals: resources that generate generators.\n\nAntimatter Dimensions canonical example:\n```\n8th Dimension → produces 7th Dimension\n7th → produces 6th\n...\n2nd → produces 1st\n1st → produces Antimatter\n```\nEach tier's count determines the *rate* of production for the tier below. Buying one 5th Dimension increases 4th Dimension production — not antimatter directly. This creates compound growth and a natural reason for numbers to accelerate.\n\nCookie Clicker's \"synergy upgrades\" achieve something similar: owning Grandmas boosts Farm production, owning Farms boosts Grandma production — cross-generator dependencies.\n\n---\n\n## Resource Conversion Chains\n\nMany deep incrementals use **A → B → C chains** where each resource is a converted form of the prior.\n\n### Why conversion chains are satisfying:\n1. **Makes abstract numbers concrete**: \"wood → planks → buildings\" is meaningful; \"number → bigger number\" is not\n2. **Creates pacing bottlenecks**: you can be rich in wood but poor in iron, creating varied decision pressure\n3. **Progression visibility**: unlocking a new conversion step feels like a paradigm shift\n4. **Optimization depth**: players can optimize conversion ratios, not just raw production\n\n### Kittens Game conversion chain (simplified):\n```\nCatnip (gather) → Meadows (boost) → Food (consumption) → Population\nPopulation → Workers → Mining, Woodcutting, Science work\nWood + Minerals → Workshops → Efficiency upgrades\nScience → Techs → New resource types (iron, coal, oil, uranium...)\nOil → Steamworks → Catnip efficiency (closes a loop!)\n```\n\nThe game's complexity comes from loops within loops — later resources feed back to affect early ones.\n\n### Universal Paperclips conversion chain:\n```\nWire → Paperclips (manual) → Operations+Creativity → Projects/Upgrades\nPaperclips → $ (sales) → More wire\nTrust → Processors/Memory → Operations ceiling raised\n```\nEach stage restructures what matters.\n\n---\n\n## Soft Caps and Diminishing Returns\n\nIncrementals use soft caps deliberately to:\n1. **Signal prestige time** — if growth feels slow, it's time to reset\n2. **Extend content lifetime** — prevent players from exhausting content too quickly\n3. **Create strategic texture** — \"do I fight through the soft cap or reset?\"\n\n### Types of soft caps:\n\n**Exponential cost scaling** (universal):\nPrice = BaseCost × Multiplier^owned\nAs you buy more of anything, each unit costs exponentially more. Eventually the cost curve outpaces the income curve — this IS the soft cap.\n\n**Galaxy upgrades** (Antimatter Dimensions):\nEach \"Galaxy\" (an acceleration purchase) costs progressively more of a special resource. Early galaxies are cheap and powerful; late galaxies are expensive and marginally better. Forces prestige.\n\n**Diminishing multipliers**:\nSome upgrades give +10%, +8%, +6%, +4%... instead of constant +10%. Each subsequent purchase of the same type is worth less. Used to make diversified investment more efficient than stacking one type.\n\n**Logarithmic scaling**:\nReward = log(input) — common for prestige currency formulas. Doubling prestige currency requires 8× more cookies (Cookie Clicker), 4× more (Realm Grinder), or 128× more (Egg, Inc.) depending on exponent.\n\n---\n\n## See Also\n\n- [Core Loop](/wiki/topics/incremental-games-core-loop/)\n- [Upgrade Systems](/wiki/topics/incremental-games-upgrades/)\n- [Scaling & Numbers](/wiki/topics/incremental-games-scaling/)\n- [Prestige Mechanics](/wiki/topics/incremental-games-prestige/)\n\n## Sources\n- incremental-games-research.md\n";</script>

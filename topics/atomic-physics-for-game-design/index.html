<script>window.__MD__ = "# Atomic Physics for Game Design — Hub\n\n> Hub page for R-007. The atomic world as a game designer's toolkit: structures, behaviors, forces, and interactions at every scale, from quarks to chemistry. Each section links to a deep-dive page and ends with **Game relevance** notes.\n\n---\n\n## What Is This Wiki For?\n\nThis knowledge base maps the atomic world for a game designer building a game where atomic realism informs fictional mechanics. Every real concept here is a candidate game mechanic, resource, stat, or visual. The goal is accuracy first, creativity second — understand what things *are* before designing what they *do*.\n\n**Six deep-dive pages:**\n- [Structure](/wiki/topics/atomic-structure/) — particles, shells, orbitals, nuclei\n- [Behaviors & Forces](/wiki/topics/atomic-behaviors/) — forces, electron behavior, nuclear reactions, chemical bonding\n- [Quantum Concepts](/wiki/topics/atomic-quantum/) — superposition, entanglement, tunneling, uncertainty\n- [Energy, Radiation & Periodic Table](/wiki/topics/atomic-energy-radiation/) — EM spectrum, radiation types, units, periodic table, key elements\n- [Visual Design Reference](/wiki/topics/atomic-visual-design/) — how atoms look in science, film, and art; 4 visual directions for game art\n- [Game Design Catalogue](/wiki/topics/atomic-game-design-catalogue/) — 15 physics games, 10 mechanic translations, genre fit ratings, arena survivor concept\n\n---\n\n## Quick-Reference: The Scales of the Atomic World\n\n| Scale | Size | What Lives Here |\n|---|---|---|\n| Nucleus | ~1–10 fm (femtometers) | Protons, neutrons, quarks, gluons |\n| Atom | ~1–5 Å (angstroms) | Nucleus + electron cloud |\n| Molecule | ~1–100 nm | Atoms bonded together |\n| Nanoparticle | 1–100 nm | Clusters of atoms/molecules |\n| Visible world | > 1 mm | What we can see unaided |\n\n---\n\n## The Cast: Major Particle Types at a Glance\n\n| Particle | Charge | Mass | Role |\n|---|---|---|---|\n| Proton | +1 | ~1 amu | Nuclear identity (Z count) |\n| Neutron | 0 | ~1 amu | Nuclear glue + mass |\n| Electron | −1 | ~0.00055 amu | Chemistry, bonds, charge |\n| Up quark | +2/3 | tiny | Component of protons/neutrons |\n| Down quark | −1/3 | tiny | Component of protons/neutrons |\n| Gluon | 0 | 0 | Carries the strong force |\n| Photon | 0 | 0 | Carries EM force; light |\n| Neutrino | 0 | ~0 | Emitted in beta decay; ghostly |\n| Positron | +1 | ~0.00055 amu | Anti-electron; annihilates on contact |\n\n---\n\n## The Four Forces at a Glance\n\n| Force | Relative Strength | Range | Carrier | Role |\n|---|---|---|---|---|\n| Strong nuclear | 1 (reference) | ~1 fm | Gluon | Holds nucleus together |\n| Electromagnetic | ~1/137 | Infinite | Photon | Bonds, light, chemistry |\n| Weak nuclear | ~10⁻⁶ | \u003c 0.1 fm | W/Z bosons | Radioactive decay |\n| Gravity | ~10⁻³⁸ | Infinite | (Graviton, unconfirmed) | Negligible at atomic scale |\n\n**Game relevance:** Four forces = four resource/damage types. Strong = binding energy (structure integrity); EM = attack/defense (charge interactions); Weak = decay/corruption (time-based degradation); Gravity = macro-level only, negligible for atomic gameplay.\n\n---\n\n## Game Design Themes by Concept\n\n| Concept | Core Game Mechanic Idea |\n|---|---|\n| Electron shells | Upgrade tiers with capacity limits (K=2, L=8, M=18…) |\n| Valence electrons | Bonding slots — how many connections an entity can form |\n| Radioactive decay | Time-based resource depletion; half-life countdown timers |\n| Half-life | Probability-based expiration (not guaranteed, statistical) |\n| Isotopes | Same entity, different stats (same Z, different mass/stability) |\n| Fission | Area-of-effect chain reaction: one split triggers more |\n| Fusion | Combining two units creates one more powerful (with energy cost) |\n| Critical mass | Threshold mechanic: below threshold = stable; above = cascade |\n| Quantum superposition | Unit exists in multiple states until observed/measured |\n| Quantum entanglement | Two remote units share state — change one, change both |\n| Quantum tunneling | Bypassing barriers at low probability; infiltration mechanic |\n| Pauli exclusion | No two units can occupy identical states — diversity bonus |\n| Binding energy | Energy cost to disassemble a structure; stability as HP |\n| Electronegativity | Faction affinity — how strongly an entity attracts resources |\n| Noble gas stability | \"Full shell\" bonus: complete set = immunity/invincibility |\n| Decay chain | Sequential transformation: A → B → C → stable end-state |\n| Chain reaction | Exponential amplification above critical threshold |\n| Ionization | Stripping an electron = losing a defensive layer |\n| Excited state | Temporary power boost; must return to ground state (cooldown) |\n\n---\n\n## Deep Dives\n\n- [Atomic Structure](/wiki/topics/atomic-structure/) — particles, orbitals, nuclear structure\n- [Atomic Behaviors & Forces](/wiki/topics/atomic-behaviors/) — four forces, decay, fission, fusion, bonding\n- [Quantum Concepts](/wiki/topics/atomic-quantum/) — wave-particle duality, superposition, entanglement, tunneling\n- [Energy, Radiation & Periodic Table](/wiki/topics/atomic-energy-radiation/) — EM spectrum, radiation types, units, key elements\n- [Visual Design Reference](/wiki/topics/atomic-visual-design/) — scientific visualizations, film refs, CPK colors, Cherenkov glow, 4 art direction proposals\n- [Game Design Catalogue](/wiki/topics/atomic-game-design-catalogue/) — 15 physics games, 10 mechanic translations, genre fit, arena survivor concept \"VALENCE\"\n\n## Sources\n\n- Wikipedia: Subatomic particle, Quantum tunnelling, Electromagnetic spectrum\n- Britannica: Subatomic particles, Periodic table, Nuclear fission\n- DOE Explains: Quarks and Gluons, Protons\n- CERN Standard Model\n- Chemistry LibreTexts: Atomic Orbitals and Quantum Numbers\n- World Nuclear Association: Nuclear Power Reactors, Physics of Uranium\n- MIT News: rad, rem, sieverts, becquerels explained\n- NASA Imagine the Universe: Electromagnetic spectrum\n";</script>

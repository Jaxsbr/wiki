<script>window.__MD__ = "# Solo & Micro-Team Steam Success Stories\n\n20 documented cases. Focus: developers with average/basic starting skills who shipped something real.\n\n→ Overview and strategy: [Solo Dev on Steam](/wiki/topics/solo-dev-on-steam/)  \n→ Scope rules: [First Game Scope Guide](/wiki/concepts/first-game-scope/)\n\nRevenue estimates from gamalytic/Steam Spy (±30-40% uncertainty) unless noted as confirmed.\n\n---\n\n## The Breakout Stories\n\nThese are the outliers — shown for inspiration and pattern extraction, not expectation-setting.\n\n### Stardew Valley — ConcernedApe (Eric Barone), 2016\n\n![Stardew Valley](https://cdn.akamai.steamstatic.com/steam/apps/413150/header.jpg)\n\n[Steam](https://store.steampowered.com/app/413150/) · [Watch trailer](https://www.youtube.com/results?search_query=Stardew+Valley+launch+trailer)\n\n- **Revenue:** 50M+ units all platforms; est. $400M+ gross lifetime\n- **Engine:** Custom C# / MonoGame (XNA framework)  \n- **Art:** Self-taught 16-bit pixel art, inspired by SNES Harvest Moon\n- **Dev time:** 4.5 years, 10–12 hours/day, 7 days/week\n- **Prior skills:** CS degree (never got a job with it); no professional art, music, or game dev experience. Taught himself pixel art, music composition, and C# simultaneously\n- **Day job:** Part-time evening usher at the Paramount Theatre; girlfriend worked two jobs supporting them\n- **What worked:** Scratched an underserved itch (Harvest Moon on PC), obsessive polish, Chucklefish publishing handled porting/marketing\n\n> \"I felt like if I worked really hard for a few years I could make something great.\"\n\n---\n\n### Vampire Survivors — Luca Galante / poncle, 2022\n\n![Vampire Survivors](https://cdn.akamai.steamstatic.com/steam/apps/1794680/header.jpg)\n\n[Steam](https://store.steampowered.com/app/1794680/) · [Watch trailer](https://www.youtube.com/results?search_query=Vampire+Survivors+official+trailer)\n\n- **Revenue:** ~9.9M copies Steam; ~$57M gross; total asset cost ~£1,100\n- **Engine:** Phaser (HTML5), later ported to Unity for v1.6+\n- **Art:** Free sprite packs including a Castlevania-themed pack; chaotic visual mismatch was an accident — sprites weren't rendered at the right size; kept it because it worked\n- **Dev time:** ~1 year (2020 → Dec 2021 Early Access)\n- **Prior skills:** Programmer for a mobile gambling company; no indie game experience. \"Mercenary\" asset-grabbing approach\n- **Day job:** Working at mobile gambling company when he started; quit within a week after Early Access exploded\n- **What worked:** SplatterCat's YouTube video (Jan 7 2022) triggered a viral explosion; ultra-simple instantly-readable loop; $2.99 entry price; extremely streamable\n\n---\n\n### Balatro — LocalThunk, 2024\n\n![Balatro](https://cdn.akamai.steamstatic.com/steam/apps/2379780/header.jpg)\n\n[Steam](https://store.steampowered.com/app/2379780/) · [Watch trailer](https://www.youtube.com/results?search_query=Balatro+game+official+trailer)\n\n- **Revenue:** 5M+ copies; $50M+ gross; 119K copies on launch day alone\n- **Engine:** LÖVE 2D (Lua-based framework)\n- **Art:** Minimalist card UI — not artistically demanding\n- **Dev time:** Dec 2021 prototype → Feb 2024 launch = ~2.25 years; first year was evenings/weekends only; quit IT job Jan 2023 to go full-time\n- **Prior skills:** IT worker in Saskatchewan; had made hobby games for 10 years (\"small projects shown to friends\"). Intentionally avoided playing other deckbuilders: \"I wanted to reinvent the wheel\"\n- **Day job:** Full-time IT worker until Jan 2023 — first entire year of development was nights and weekends\n- **What worked:** Genuinely novel mechanic (poker + roguelite), Steam Next Fest demo drove 208K wishlists, organic streamer pickup\n\n---\n\n### Buckshot Roulette — Mike Klubnika, 2024\n\n![Buckshot Roulette](https://cdn.akamai.steamstatic.com/steam/apps/2835570/header.jpg)\n\n[Steam](https://store.steampowered.com/app/2835570/) · [Watch trailer](https://www.youtube.com/results?search_query=Buckshot+Roulette+official+trailer)\n\n- **Revenue:** 6M+ copies; started on itch.io at $1.20 (Dec 2023), Steam at $2.99 (Apr 2024)\n- **Engine:** Godot (after Unity fee announcement)\n- **Art:** Lo-fi 3D industrial aesthetic; Klubnika started modeling 3D as a high-schooler\n- **Dev time:** ~3 months total\n- **Prior skills:** Self-taught Estonian hobbyist; made experimental horror games during military conscript service. No professional background\n- **Day job:** Was serving as Estonian military conscript\n- **What worked:** Unique horror-gambling premise, perfect scope (one mechanic), viral TikTok + streamer coverage; price nearly free\n\n---\n\n### Lethal Company — Zeekerss, 2023\n\n![Lethal Company](https://cdn.akamai.steamstatic.com/steam/apps/1966720/header.jpg)\n\n[Steam](https://store.steampowered.com/app/1966720/) · [Watch trailer](https://www.youtube.com/results?search_query=Lethal+Company+official+trailer)\n\n- **Revenue:** 10M+ copies; ~$100M gross est.\n- **Engine:** Unity\n- **Art:** Intentionally janky lo-fi 3D horror; PS1 aesthetic, low-resolution textures. The jank IS the vibe\n- **Dev time:** 1–2 years (prior games since age 11 on Roblox)\n- **Prior skills:** Self-taught; decade on Roblox before Unity; earlier Unity games had small audiences. Released at age 21\n- **What worked:** Co-op horror multiplayer is extremely streamable; $9.99 price; viral TikTok content; PS1 aesthetic fits found-footage horror tone\n\n---\n\n### Manor Lords — Greg Styczeń / Slavic Magic, 2024\n\n![Manor Lords](https://cdn.akamai.steamstatic.com/steam/apps/1363080/header.jpg)\n\n[Steam](https://store.steampowered.com/app/1363080/) · [Watch trailer](https://www.youtube.com/results?search_query=Manor+Lords+official+trailer)\n\n- **Revenue:** 1M copies in a single day; 2M+ in first week\n- **Engine:** Unreal Engine 4/5\n- **Art:** 3D medieval strategy; used contractors for some assets after Patreon income\n- **Dev time:** ~7 years — started as a hobby; full-time only after 2020 Patreon + Epic MegaGrant\n- **Prior skills:** Film production background; started in RPG Maker 2000 as a child; self-taught UE4\n- **Day job:** Part-time hobby → Patreon replaced income in 2020\n- **What worked:** 3M+ Steam wishlists built over years of devlog content; niche (medieval city-builder) with no competition; stunning visual quality for a solo dev\n\n---\n\n### Brotato — Thomas Gervraud / Blobfish, 2022\n\n![Brotato](https://cdn.akamai.steamstatic.com/steam/apps/1942280/header.jpg)\n\n[Steam](https://store.steampowered.com/app/1942280/) · [Watch trailer](https://www.youtube.com/results?search_query=Brotato+game+trailer+official)\n\n- **Revenue:** 1M copies in Early Access (2022); 10M+ by 2025\n- **Engine:** Godot (first Godot project)\n- **Art:** Simple cartoon potato characters; manageable 2D style\n- **Dev time:** \"A few months\" for the demo that went viral at Steam's Going Rogue festival; ~9 months to 1.0\n- **Prior skills:** Had made Space Gladiators and Lost Potato before; self-taught\n- **What worked:** Vampire Survivors-inspired wave survival with deeper build variety; festival demo went viral; Godot community goodwill\n\n---\n\n### Hollow Knight — Team Cherry (2 people), 2017\n\n![Hollow Knight](https://cdn.akamai.steamstatic.com/steam/apps/367520/header.jpg)\n\n[Steam](https://store.steampowered.com/app/367520/) · [Watch trailer](https://www.youtube.com/results?search_query=Hollow+Knight+official+trailer)\n\n- **Revenue:** 15M+ copies; $30M+ gross\n- **Engine:** Unity\n- **Art:** Hand-drawn 2D — Ari Gibson (artist) is self-taught from Flash game hobby background\n- **Dev time:** ~4 years; Kickstarter raised AU$57K\n- **Prior skills:** Pellen studied web design at TAFE SA; Gibson self-taught. Both made Flash games as a hobby before forming Team Cherry\n- **Day job:** Worked full-time to fund development; burning through personal savings\n- **What worked:** Exceptional quality at $15 price, aggressive content additions post-launch, Metroidvania word-of-mouth\n\n---\n\n### Terraria — Andrew \"Redigit\" Spinks / Re-Logic, 2011\n\n![Terraria](https://cdn.akamai.steamstatic.com/steam/apps/105600/header.jpg)\n\n[Steam](https://store.steampowered.com/app/105600/) · [Watch trailer](https://www.youtube.com/results?search_query=Terraria+official+trailer)\n\n- **Revenue:** 44.5M+ copies all platforms; one of the best-selling games ever\n- **Engine:** Custom C# / XNA (self-taught from Visual Basic)\n- **Art:** Functional pixelated 2D sandbox\n- **Dev time:** Jan 2011 → May 2011 (4 months for v1.0); built fast\n- **Prior skills:** Self-taught; started with Visual Basic, moved to C#. Prior project: Super Mario Bros. X fan game\n- **What worked:** Minecraft was at peak cultural moment; Terraria offered 2D sandbox at $9.99; 13+ years of content additions\n\n---\n\n### Papers, Please — Lucas Pope, 2013\n\n![Papers Please](https://cdn.akamai.steamstatic.com/steam/apps/239030/header.jpg)\n\n[Steam](https://store.steampowered.com/app/239030/) · [Watch trailer](https://www.youtube.com/results?search_query=Papers+Please+official+trailer)\n\n- **Revenue:** 5M+ copies; $126M gross est.\n- **Engine:** Custom engine built by Pope\n- **Art:** Soviet bureaucratic aesthetic — deliberately lo-fi, functional pixel art. No art training\n- **Dev time:** ~1 year\n- **Prior skills:** Professional programmer at Naughty Dog on Uncharted; zero commercial indie experience; no art training\n- **What worked:** Completely novel mechanic, strong critical reception at IGF, unique art direction\n\n---\n\n## The \"Day Job Throughout\" Cases\n\nThese are the most relevant for Jaco's situation.\n\n### The First Tree — David Wehle, 2017\n\n- **Revenue:** 200,000+ copies; ~$150K+ revenue\n- **Engine:** Unity + **Playmaker** (visual scripting — **zero code written**)\n- **Art:** Purchased Unity Asset Store packs (environment packages, templates); no original 3D art created\n- **Dev time:** ~2 years, part-time while working full-time as technical artist at The VOID (VR company)\n- **Prior skills:** Technical artist and video editor; **no programming knowledge whatsoever**\n- **Day job:** Full-time technical artist throughout development\n- **What worked:** Personal emotional narrative (lost father), short (~2 hours), $7.99 price, Reddit front page at launch, Firewatch-style marketing resonated\n\n> \"The only thing stopping you from making a game is yourself.\"\n\n---\n\n### Core Defense — Mario Kaiser (ehmprah), 2020\n\n- **Revenue:** $20K first week; ~$50K–70K total\n- **Engine:** Custom JavaScript (Vue.js + Pixi.js + Electron) — used familiar web dev tools, not Unity\n- **Art:** Deliberately minimalist; no art skills needed — embraced it as a feature\n- **Dev time:** Alpha in ~2 months; beta on itch.io 6 months before Steam launch; ~8 months total\n- **Prior skills:** Web developer background; prior failed game (Coregrounds); no art skills\n- **Day job:** Unknown; appears to have been indie dev after Coregrounds\n- **What worked:** 3,000 wishlists from pre-release demo (best ROI of any tactic); Discord community during development; >50% sales from non-English markets after localization\n\n---\n\n### Luck Be a Landlord — Dan DiIorio / TrampolineTales, 2023\n\n![Luck Be a Landlord](https://cdn.akamai.steamstatic.com/steam/apps/1404850/header.jpg)\n\n[Steam](https://store.steampowered.com/app/1404850/) · [Watch trailer](https://www.youtube.com/results?search_query=Luck+Be+a+Landlord+official+trailer)\n\n- **Revenue:** ~806K units; ~$4.8M gross\n- **Engine:** Godot\n- **Art:** Simple slot machine UI with pixel-style icons; not artistically demanding\n- **Prior skills:** Self-taught Godot programmer; inspired by Slay the Spire and freeware; ADHD, no professional background\n- **What worked:** Novel mechanic (anti-landlord slot machine roguelite); political resonance; steady update cadence; open development\n\n---\n\n### Undertale — Toby Fox, 2015\n\n![Undertale](https://cdn.akamai.steamstatic.com/steam/apps/391540/header.jpg)\n\n[Steam](https://store.steampowered.com/app/391540/) · [Watch trailer](https://www.youtube.com/results?search_query=Undertale+official+trailer+2015)\n\n- **Revenue:** 3.5M+ Steam copies; ~$126M gross est.\n- **Engine:** GameMaker: Studio\n- **Art:** Deliberately simple pixel art; some contract art help from Temmie Chang\n- **Dev time:** ~2.5 years; Kickstarter raised $51K\n- **Prior skills:** Made ROM hacks and RPG Maker games before; music was his real skill. Programming and art were hobbyist level\n- **Day job:** College student / part-time work during early development\n- **What worked:** Subversive mechanics that remembered your choices; exceptional music; cult internet community\n\n---\n\n### iZBOT — Daniel Spruce (18 months, 2–3 hours/night)\n\n- **Revenue:** ~$4K total; ~$1K total costs\n- **Engine:** Not specified\n- **Dev time:** 18 months, 2–3 hours/night after full-time job and family obligations\n- **Prior skills:** Hobbyist with full-time job and family\n- **Day job:** Full-time employee with family throughout\n- **Honest outcome:** Recouped costs but modest returns. Best lesson: \"Focus resources on high-impact activities only\"\n\n---\n\n### Thronefall — Grizzly Games (Jonas Tyroller + Paul Schnepf), 2023\n\n![Thronefall](https://cdn.akamai.steamstatic.com/steam/apps/2239150/header.jpg)\n\n[Steam](https://store.steampowered.com/app/2239150/) · [Watch trailer](https://www.youtube.com/results?search_query=Thronefall+game+official+trailer)\n\n- **Revenue:** 1M copies in first year; $1.5M+ gross\n- **Engine:** Unity + C#; 3D modeled in Blender\n- **Art:** Deliberately minimalist flat-color 3D — intentional to ship faster. Not artistically demanding\n- **Dev time:** ~1–2 years (duo, post-university)\n- **Prior skills:** Jonas started at age 9 (~20 years experience); Paul primarily UI. Jonas had prior game (Islanders) with community\n- **What worked:** Jonas's YouTube channel had built-in audience from years of devlogs; minimalist design stripped out \"everything not fun\"\n\n---\n\n## Pattern Summary Across All Cases\n\n| Pattern | Games |\n|---|---|\n| Free asset packs → still huge revenue | Vampire Survivors, Brotato |\n| Zero code / visual scripting | The First Tree (Playmaker), GameMaker drag-and-drop |\n| Minimalist art as design choice | Core Defense, Luck Be a Landlord, Thronefall |\n| Lo-fi 3D jank as aesthetic | Lethal Company, Buckshot Roulette |\n| Personal emotional story | The First Tree, Stardew Valley, Undertale |\n| Viral via one YouTube/TikTok video | Vampire Survivors (SplatterCat), Buckshot Roulette (TikTok) |\n| Years of devlogs → wishlist mountain | Manor Lords (3M wishlists), Thronefall |\n| itch.io → Steam pipeline | Buckshot Roulette, Core Defense, Brotato |\n| Day job until near completion | LocalThunk (Balatro), Galante (Vampire Survivors), Wehle (First Tree) |\n| 3 months or less | Buckshot Roulette, Terraria v1.0 (with caveats) |\n\n---\n\n## See Also\n- [Solo Dev on Steam](/wiki/topics/solo-dev-on-steam/)\n- [First Game Scope Guide](/wiki/concepts/first-game-scope/)\n- [Indie Engines & Frameworks](/wiki/topics/indie-engines-frameworks/)\n\n## Sources\n- levasho-reddit-hackathon.md\n- solo-dev-steam-research.md\n";</script>

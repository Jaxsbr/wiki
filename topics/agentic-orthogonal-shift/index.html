<script>window.__MD__ = "# The Orthogonal Shift — T3 → T4\n\n> The centerpiece of the agentic engineering framework. The boundary between Tier 3 (in-loop Agent Director) and Tier 4 (out-of-loop Agent Operator) is not a harder prompting trick — it is a role change of ~90°.\n\nThe Orthogonal Shift is the single most consequential boundary in the [Tier Spine](/wiki/topics/agentic-tier-spine/). Every other transition in the framework is additive — you learn a new tool, refine a skill, add a technique. This one is rotational. It requires giving something up while simultaneously adding something new. That combination is why it is the hardest crossing, and why prompting skill alone does not predict who makes it.\n\n---\n\n## 1. What Rotates\n\nThe fundamental activity changes direction, not just magnitude.\n\n**Prompting** (Tier 1–3) means telling the agent what to do, step by step, while staying in the loop. You are the navigator at every waypoint. The skills involved — crafting precise instructions, iterating in-editor, reading model output and correcting course — are all oriented around *how*.\n\n**Delegating** (Tier 4+) means handing over an *outcome + bounds*, stepping *out of the loop*, and verifying the result at checkpoints. The activity is now oriented around *what + within-what-limits + how-I'll-check*.\n\nThe rotation is approximately 90°. Not 180° (it is not the opposite of prompting), not 0° (it is not an extension of prompting). It is genuinely perpendicular.\n\nThis has one important implication: **the Transition-1 skills do not extend into Transition 2.** Prompting craft, in-editor generation, conversational refinement — all of these are roughly orthogonal to the delegation skills. Getting very good at Tier 3 does not point toward Tier 4 any more than driving very fast in first gear prepares you to shift into second. The skills involved in shifting gears are different from the skills involved in accelerating in first gear.\n\nThe analogy is exact: Transition-2 changes gears. It does not make first gear go faster.\n\n---\n\n## 2. Why It's Hard for Engineers Specifically\n\nThe IC's superpower becomes a liability.\n\nStrong individual contributors are trained to be precise, exhaustive, and step-wise. They earn seniority by thinking through every edge case, specifying every constraint, and holding the implementation in their head from start to finish. This is exactly the skill that makes over-specification at Tier 4 so tempting — and so damaging.\n\nOver-specifying *how* creates three compounding problems:\n\n1. **It removes the agent's good local decisions.** The agent's contextual judgment is one of its most valuable outputs. A step-list bypasses it entirely.\n2. **It burns tokens re-deriving the over-specified.** The agent has to work through your constraints to arrive at an implementation that you already partially described. You paid for the generation without gaining from it.\n3. **It caps output at what you could already imagine.** The agent cannot usefully surprise you because you left no room for it to range. You get approximately what you could have written yourself, faster.\n\nThis mirrors the IC → engineering-manager transition almost exactly. Managers who cross quickly are usually not the weakest ICs — they are people who were never as attached to step-level control. Strong ICs struggle *more*, not less, because the thing they are being asked to release is their primary source of professional identity: knowing exactly how it will work.\n\n### Evidence from research\n\narXiv 2506.12347 (Kumar et al., Microsoft, 2025) studied 19 developers using Cursor Agent on 33 real issues. Several findings directly support the orthogonality thesis:\n\n- Participants whose prompting patterns worked best \"mirror those of software engineering managers\" — they withheld expert knowledge up-front and injected it as corrective feedback at checkpoints, rather than pre-specifying implementation.\n- Developers stopped agents in **39% of responses** where the agent performed >3 actions, compared to 9% for responses with ≤3 actions. The discomfort with loss of control is real, measurable, and specifically triggered by agents taking initiative — not by agent error.\n- \"Human routers\" — people who relayed environmental feedback without substantive collaboration — performed *worse* than active collaborators. The failure mode is not just over-watching; it is also failing to engage substantively when you do look.\n\nThe 39% premature stopping figure is the empirical anchor for the orthogonality claim. It shows that the discomfort is qualitatively different from \"I need to write better prompts\" — it is triggered specifically by the *loss of step-level visibility*, regardless of whether the agent is actually making good decisions.\n\n### The dissenting view — and why the data overrules it\n\nThe strongest case against the orthogonality thesis: some practitioners argue Transition 2 is a continuous extension of Transition 1. Better prompting produces better delegation; there is no hard break, just more sophistication. Give better instructions, get better output, hand off more confidently. No gear change required.\n\nThe counter-argument: **prompting skill does not predict delegation comfort.** The best prompters are not reliably the best delegators. The 39% premature stopping rate is not correlated with prompting quality — it is correlated with the *number of agent actions*, i.e., with how much initiative the agent took. That is a different variable entirely. The discomfort is not \"I gave bad instructions,\" it is \"I can't see what it's doing.\" Fixing the prompting does not fix that discomfort. A different skill is required.\n\n---\n\n## 3. The Two-Engineer Comparison\n\nTwo engineers, same task, same agent, same model, same hour. Wildly different output. The delta is working style, not talent or effort.\n\n**Engineer A** approaches the task the way they would approach writing the code themselves. They produce a 40-step prompt — essentially an implementation spec with agent syntax. During the run they watch the transcript; any deviation from the plan gets corrected back to the stated steps. The run finishes and produces approximately what Engineer A could have written themselves, perhaps 30–40% faster. The agent was a faster keyboard for a plan they already held.\n\n**Engineer B** writes a brief: the outcome (what done looks like), the constraints (what the agent may and may not touch), and the acceptance criteria (how they will verify it at the end). The brief is shorter than Engineer A's by a factor of five. Engineer B does not watch the run. At checkpoint they review the diff, the tests, the CI result. The agent took an approach B hadn't considered; the tests pass; scope is three times what B would have produced alone. The agent usefully surprised them because they left it room.\n\nSame agent. Same model. **Same underlying prompting skill** — Engineer B's brief is shorter, not fancier. The delta is working style: specifically, whether the engineer released step-level control and installed evidence-based verification instead.\n\nThis illustration has a precise name in the framework: the Two-Engineer Comparison. It is the most direct demonstration that the shift is about working style, not intelligence, not tool mastery, not prompting sophistication.\n\n---\n\n## 4. The Four Mindset Inversions\n\nThe shift requires four specific belief rewirings. Each has a visible behavioral correlate — you can observe it in someone's prompts and in how they respond when runs deviate.\n\n### 1. Outcome over procedure\n\n> \"Does it meet the acceptance criteria?\" replaces \"Did it follow my steps?\"\n\n**Before:** The measure of a good run is fidelity to the plan. Deviation from the prescribed steps is failure, even if the output is correct.\n\n**After:** The measure of a good run is the output matching the stated criteria. The path the agent took is irrelevant if the destination is correct.\n\n**Behavioral correlate:** An engineer still at Tier 3 will stop a run when the agent takes a different approach from what was specified, even when the approach would have worked. An engineer who has crossed will let it run and check the output.\n\n### 2. Trust-then-verify over control\n\n> \"I'll check the evidence when it's done\" replaces \"I need to watch each step.\"\n\n**Before:** Confidence comes from watching. You feel okay about the output because you observed the generation.\n\n**After:** Confidence comes from evidence. You feel okay about the output because the tests pass, CI is green, the types check.\n\n**Behavioral correlate:** Tier-3 engineers open the transcript during the run to \"make sure it's on track.\" Tier-4 engineers set up the evidence substrate before launching and review that substrate after completion.\n\n### 3. Bounds over steps\n\n> \"Here's what it may/may-not touch; choose the approach\" replaces \"Step 1: open file X; Step 2: add function Y.\"\n\n**Before:** The prompt contains the implementation. The agent executes the prompt.\n\n**After:** The prompt contains the outcome, the sandbox width (what the agent may touch, what it must not), and the success criteria. The agent chooses the implementation.\n\n**Behavioral correlate:** Tier-3 prompts look like implementation specs with imperative steps. Tier-4 prompts look like project briefs with outcome + constraints + done criteria.\n\n### 4. Throughput over involvement\n\n> \"How many tasks can I have running at once?\" replaces \"Am I watching this one carefully enough?\"\n\n**Before:** The bottleneck is your attention per task. One task at a time, carefully watched.\n\n**After:** The bottleneck is your review bandwidth and the quality of your evidence substrates. Multiple tasks run concurrently; you rotate through checkpoints.\n\n**Behavioral correlate:** Tier-4 engineers think about decomposing work into parallelizable units. Tier-3 engineers think about how to make this one run go well.\n\n---\n\n## 5. The Six Hard Transition-2 Competencies\n\nThese are the specific skills that constitute the crossing. All six warrant standalone practice. None is a rounding error. Mastering two or three while being weak on the others produces characteristic failure patterns (see [Skew Profiles](/wiki/topics/agentic-skew-profiles/)).\n\n### 1. Intent specification and bounds-setting\n\nWriting a brief that specifies: outcome, success criteria, hard constraints (what the agent must not do), and sandbox width (what it may touch). The spec is the leverage: vague specs multiply errors across the entire run; strong specs multiply into precise implementations across a wide scope.\n\nThe brief is not a shorter version of a step-list. It is a different document. A step-list answers \"how.\" A brief answers \"what + within what limits + how will we know it's done.\"\n\nThe skill here is knowing what to specify and what to leave open. Over-specification is a brief failure as much as under-specification. The brief should constrain the blast radius while leaving the implementation space open.\n\n### 2. Trust calibration\n\nKnowing which work to hand off blind and which to guard. This is NOT \"more checking is better.\" Calibration, not volume.\n\nThe two calibration axes are **blast radius** (how bad is it if this goes wrong?) and **reversibility** (how easily can we undo it?).\n\n- Boilerplate generation, test scaffolding, type stubs, documentation drafts → hand off blind; low blast radius, fully reversible\n- Production authentication code, database migrations, public API contracts → guard hard; high blast radius, partially reversible or irreversible\n\nThe failure mode of weak trust calibration is applying the same verification intensity to everything — either watching everything too closely (burning review bandwidth on low-risk work) or trusting everything equally (skipping verification on high-risk work).\n\n### 3. Verification, eval, and agent-driven QA\n\nThe transition from hand-testing every path → directing the agent to write tests, then reviewing the *tests* more carefully than the implementation.\n\n\"I read every line\" is NOT \"I verified it works.\" Reading code is syntax checking. Verification is running the code against known inputs and measuring outputs against known-correct outputs.\n\nTier-4 verification installs an evidence substrate — tests, CI, type checks, evals — and uses that substrate as the primary confidence source. The engineer reviews the tests harder than the implementation, because the tests are the verification of the verification.\n\nThis is counter-intuitive to strong engineers. Being unable to let go of line-by-line review feels like diligence; it is actually a Tier-3 tell.\n\n### 4. Failure recovery and intervention\n\nWhen a delegated run derails, the Tier-4 response is diagnostic, not reactive.\n\n**The instinct to grab the wheel is the in-loop reflex.** The Tier-4 response is:\n\n1. Don't take over immediately\n2. Diagnose: was it context rot (agent lost the thread over a long run)? Ambiguous brief (you didn't specify the constraint that mattered)? Wrong tool for the task? Scope bleed (agent went beyond stated bounds)?\n3. **Critique the brief, not the agent.** A derailed run is almost always a brief problem. What constraint was missing? What was under-specified?\n4. Decide: restart vs. salvage vs. take over — as a deliberate choice, not a reflex\n\nRestarts are cheap. Each restart is an opportunity to write a better brief. Taking over mid-run is sometimes right (wrong tool, safety concern), but it should be a deliberate, considered decision.\n\n**Maturity tell:** An engineer who, after a derailed run, first asks \"what was wrong with my brief?\" has crossed. An engineer who first asks \"what did the agent do wrong?\" has not.\n\n### 5. Parallel orchestration and throughput\n\nDecomposing goals into parallelizable, independently-verifiable units; managing review bandwidth and cost as real constraints.\n\nParallelism at Tier 4 is not just \"run two things at once.\" It requires:\n\n- Identifying which sub-tasks have no dependencies on each other\n- Designing each sub-task brief so it can be verified independently\n- Knowing your own review bandwidth ceiling (running 10 things in parallel is useless if you can only meaningfully review 3)\n- Knowing when parallelism stops paying off (coordination overhead, shared state, model cost)\n\nAt fleet level, the same judgment scales into cost-per-task awareness and model selection. The brief that over-specifies is also more expensive — you're paying tokens for the agent to work through your constraints. The bounds-based brief is both cheaper and more effective.\n\n### 6. Taste and product judgment\n\nThe ability to tell genuinely good output from impressive-looking output. The judgment layer the entire stack depends on.\n\nThis includes:\n\n- Distinguishing \"this looks correct\" from \"this is correct\" — the hardest judgment to automate\n- Deciding *what* is worth building, not just whether it was built correctly\n- The do-it-vs-delegate decision as a real-time strategic call (some tasks are better done directly; the judgment about which is non-trivial)\n\nTaste becomes more, not less, critical as delegation scales. When an agent produces a large implementation, the engineer's ability to evaluate quality — not just correctness — is the primary defense against impressive-looking-but-wrong output.\n\n---\n\n## 6. Craft Is Repositioned, Not Deleted\n\nA common misreading of the orthogonal shift: \"At Tier 4, engineering skill matters less because the agent does the work.\" This is exactly backwards.\n\nDeep engineering judgment becomes the **verification and judgment layer** the later tiers depend on. Several sources argue expertise becomes *more* critical under delegation, not less:\n\n**Addy Osmani** (\"Agentic Engineering\", Feb 2026): \"The fundamentals matter more, not less.\" Senior engineers benefit disproportionately from agentic engineering. Juniors who lean on AI before building fundamentals risk becoming able to prompt but not debug, generate but not reason.\n\n**Simon Willison** (\"Not all AI-assisted programming is vibe coding\", Mar 2025): \"AI tools amplify existing expertise.\" The amplification is not uniform — stronger foundations produce stronger amplification.\n\n**arXiv 2506.12347**: \"The junior developer workforce may be more impacted by the introduction of AI into software development teams.\" Junior developers who lack the baseline judgment to evaluate agent output are more vulnerable, not less.\n\nThe handcraft skill that feels obsolete at Tier 4 is precisely what allows you to evaluate whether the agent's output is correct. A developer who cannot read code cannot verify code, regardless of how sophisticated their delegation skills are. The ability to recognize a subtle bug in generated code — to have the intuition that something is wrong before the tests catch it — requires the same depth of engineering knowledge that was required before agents existed.\n\n**Craft moves from the keyboard to the review and judgment seat.** The work is different; the knowledge requirement is not lower.\n\n---\n\n## 7. The QA Transformation — The Sleeper Indicator\n\nHand-testing every path is a Tier-3 (in-loop) behavior. Tier-4 verification is different in kind, not just in efficiency.\n\n| Tier 3 | Tier 4 |\n|---|---|\n| I run the app and click through the paths | I had the agent write tests; I review the tests |\n| I re-read every line of generated code | I check CI, types, evals — green gate = done |\n| My confidence comes from having read it | My confidence comes from the evidence substrate |\n| \"I reviewed it\" = \"I read it\" | \"I reviewed it\" = \"it passed the tests I approved\" |\n| Verification is something I do | Verification is something I designed |\n\nThe sleeper insight: **\"I read every line\" feels more rigorous, but is not the Tier-4 signal.**\n\nReading every line of generated code is Tier-3 behavior dressed up as thoroughness. It provides false confidence — you can read correct-looking code that has a subtle runtime error, a race condition, or a security flaw that only manifests under specific conditions. Tests catch these; reading does not.\n\nThe Tier-4 signal is whether you set up the evidence substrate and reviewed *it* harder than the implementation. This is counter-intuitive to strong engineers, because being unable to let go of line-by-line review *feels* like diligence. It is actually the refusal to trust evidence over observation — the Tier-3 tell.\n\nThe QA transformation is a \"sleeper indicator\" because it is the single behavioral change most predictive of having crossed, and the one most engineers underestimate. Engineers who have adopted Tier-4 delegation in every other dimension but still hand-review every line of output have not fully crossed — they have adopted the mechanics of delegation without the epistemics.\n\n---\n\n## 8. Both Failure Poles — Equal Weight\n\nThe Orthogonal Shift has two distinct failure modes, and they deserve equal attention. The framework is not \"avoid over-specification and you've crossed.\" Both poles represent having failed to cross.\n\n### Over-boxing / over-specifying (the in-loop failure)\n\n- Prompts that look like implementation specs with numbered steps\n- Stopping the agent when it deviates from the plan, even when its approach would have worked\n- Output capped at what you could have imagined alone — the agent was a faster keyboard\n- Correction of every deviation back to the pre-specified plan\n- Recognizable by: runs that could have been inline code generation; prompts indistinguishable from implementation notes\n\n**Root cause:** Procedural control felt like quality control. The engineer cannot distinguish \"did it follow my steps\" from \"does it meet the criteria.\"\n\n### Under-verification / over-trust (the mirror failure, equal weight)\n\n- Stepping out of the loop WITHOUT installing evidence-based verification\n- Merging because the diff \"looked plausible\" — no test review, no CI gate\n- \"Vibe-merging\" — moving fast with no evidence substrate\n- Accepting agent-declared completion without running the acceptance criteria\n- Output quality matches what you'd have done alone, by accident rather than design\n\n**Root cause:** Release of procedural control was mistaken for the whole crossing. The engineer gave up the wrong thing (watching) without adding the right thing (evidence substrate).\n\n### Crossing means doing both simultaneously\n\nRelease step-level control **AND** install evidence-based verification. Releasing one without the other is a distinct failure, not partial progress.\n\nThis combination is what makes Transition 2 hard: you have to give something up (procedural control) while simultaneously adding something new (evidence-gated verification). Most transitions are additive — you add a skill. This one requires subtraction and addition at the same time. The subtraction is the harder part for strong ICs.\n\n---\n\n## 9. Token and Cost Economics\n\nOver-specification has a direct cost dimension that compounds at scale.\n\nA brief that tries to give the agent every implementation detail is both more expensive and less effective than a brief that states outcome + constraints. The agent has to process your constraints, work through them, and arrive at an implementation — often discovering that your constraints were mutually contradictory, or that you specified something the agent would have done better differently. You paid for that discovery process without gaining from it.\n\nAt individual task level this is a marginal concern. At fleet level — multiple agents, many tasks running in parallel — the same judgment scales into:\n\n- **Cost-per-task awareness:** knowing which model to use for which task; knowing which tasks warrant a large context window and which do not\n- **Model selection:** matching model capability to task requirements rather than defaulting to the strongest model for everything\n- **Parallelism limits:** knowing when adding more parallel agents stops paying off due to coordination overhead, shared state, or review bandwidth limits\n\nThe bounds-based brief is not just philosophically superior — it is cheaper to run and produces better output. The economics and the epistemics point in the same direction.\n\n---\n\n## 10. Failure Recovery as Part of the Shift\n\nFailure recovery deserves its own section because it is where the crossing is most visibly tested.\n\nWhen a delegated run goes wrong, the engineer faces a choice that reveals whether they have crossed. The in-loop reflex is to take over — to grab the wheel, fix the immediate problem, and continue. The Tier-4 response is to treat the failure as diagnostic.\n\n**The diagnosis protocol:**\n\n1. **Don't take over immediately.** The instinct to grab the wheel is the in-loop reflex. Recognize it as such.\n\n2. **Categorize the failure type:**\n   - *Context rot* — agent lost the thread over a long run; the state it was working from became inconsistent with the actual codebase state\n   - *Ambiguous brief* — you didn't specify the constraint that mattered; the agent made a reasonable choice given your spec, but not the one you wanted\n   - *Wrong tool* — the task required capabilities the agent doesn't have or tools it doesn't have access to\n   - *Scope bleed* — the agent went beyond the stated bounds, either because the bounds were under-specified or because the agent misjudged the task structure\n\n3. **Critique the brief, not the agent.** The question is: \"What constraint was missing from my brief?\" not \"What did the agent do wrong?\" A derailed run is almost always a brief problem. The agent did something reasonable given the instructions it had.\n\n4. **Decide deliberately:** restart vs. salvage vs. take over. Each has appropriate contexts:\n   - *Restart*: brief problem identified; you can write a better brief; the work done is not too expensive to discard. Restarts are cheap and educational.\n   - *Salvage*: most of the work is correct; the failure was in a specific bounded area; you can patch rather than restart.\n   - *Take over*: wrong tool (requires a capability the agent doesn't have), safety concern (the agent is about to do something irreversible and harmful), or the task structure is fundamentally unsuitable for delegation.\n\nTaking over should be a deliberate, considered choice — not the first response to any deviation. The engineer who reaches for the wheel at the first sign of trouble has not crossed.\n\n---\n\n## 11. Crossing Drills\n\nThese are concrete practices for engineers actively working the transition. They are not metaphors; they are exercises to run.\n\n### No-peeking run\n\nWrite a brief for a real task. Launch the agent. Do not open the transcript or interact with the run until it reports completion. When it completes, evaluate the *evidence* — the diff, the tests, the CI result — not the transcript. Then critique the brief: what would you change?\n\nThis drill specifically targets the over-watching reflex. The first few runs will be uncomfortable. That discomfort is the data.\n\n### Bounds-only prompts (one-week ban)\n\nFor one week, ban imperative step-lists from your prompts. Every prompt must state intent + constraints + done criteria. No numbered steps. No \"first, do X; then, do Y.\"\n\nIf you can't write the prompt without steps, that is information about the task — either you haven't clarified the outcome in your own head, or the task is not ready to delegate.\n\n### Manager-mode rewrite\n\nTake your best step-list prompt from the past week. Rewrite it as intent + constraints + acceptance criteria — same task, different brief format. Run both with the same agent on the same task. Compare the output scope and quality.\n\n### Parallel pair\n\nRun the same task with two approaches simultaneously — your old way (step-list) and the new way (bounds). Compare scope, quality, and token cost. This makes the delta visible rather than theoretical.\n\n### Deliberate-derail\n\nLet a run fail on purpose — give it a brief with one missing constraint and watch what happens. Practice diagnosing whether it was a brief problem or an agent problem. Practice the restart cycle. Make failure cheap and educational rather than costly and anxiety-producing.\n\n---\n\n## 12. Tells You're Not-Yet-Across\n\nThese are behavioral indicators, not self-assessments. The tells are visible in prompts, in how you respond to runs, and in the outputs you ship.\n\n### Over-boxing side\n\n> \"My last 3 prompts were numbered implementation steps.\"\n\n> \"When the agent deviated from my plan, I stopped it and corrected it — even though the approach it was taking might have worked.\"\n\n> \"I feel like the agent 'went off the rails' when it chose a different approach from what I'd have chosen.\"\n\n> \"I can't imagine writing a prompt without describing the steps.\"\n\n> \"My prompts and my implementation notes look almost identical.\"\n\n### Under-verification side (mirror — equal weight, not partial credit)\n\n> \"I merged because the diff looked right.\"\n\n> \"I didn't set up tests; the agent declared done and I accepted it.\"\n\n> \"I watch the transcript for red flags but don't have a systematic evidence check.\"\n\n> \"My verification is: I read the code and it seemed fine.\"\n\n> \"The agent said it was done, CI is green, I shipped it — but I didn't actually review what the tests were testing.\"\n\nBoth sets are tells. Neither is partial credit toward having crossed. An engineer who has eliminated all the over-boxing tells but still has under-verification tells has switched failure modes, not crossed.\n\n---\n\n## See Also\n\n- [Tier Spine](/wiki/topics/agentic-tier-spine/) — the T3 and T4 tier definitions in full context; where the Orthogonal Shift sits in the larger progression\n- [Branch Ladders](/wiki/topics/agentic-branch-ladders/) — Branches 2, 3, 4, and 5 carry the Transition-2 competencies as laddered sub-skills\n- [Fluency Instrument](/wiki/topics/agentic-fluency-instrument/) — the 6-axis measurement tool; gating rule for calling T4; how to score the crossing\n- [Skew Profiles](/wiki/topics/agentic-skew-profiles/) — the Prescriptive-Prose Veteran and Vibe Coder profiles; what each failure pole looks like in practice\n- [Agent Traction](/wiki/topics/agentic-traction/) — when agents get vs. lack traction; informs the trust-calibration and do-it-vs-delegate decisions\n\n---\n\n## Sources\n\n- arXiv 2506.12347, Kumar et al., Microsoft (2025) — 19 developers, Cursor Agent, 33 real issues; premature stopping rates, manager-prompting patterns, human-router failure mode\n- arXiv 2506.12469, Feng, McDonald, Zhang / University of Washington (2025)\n- Addy Osmani, \"Agentic Engineering\" (Feb 2026) — fundamentals matter more not less; senior/junior disparity\n- Addy Osmani, \"The Code Agent Orchestra\" (Mar 2026) — \"the spec is the leverage\"; spec quality as the primary multiplier on output quality\n- Eleanor Berger, \"Working with Asynchronous Coding Agents\" — driver→delegator frame; spec-before-delegate discipline; verification design\n- Thoughtworks, \"Supervisory Engineering\" — the middle loop; directing, evaluating, correcting as distinct from executing\n- Simon Willison, \"Not all AI-assisted programming is vibe coding\" (Mar 2025) — expertise amplification; distinction between delegation and abdication\n";</script>

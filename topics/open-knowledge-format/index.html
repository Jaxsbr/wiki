<script>window.__MD__ = "# Open Knowledge Format (OKF)\n\n> An open specification by Google Cloud (v0.1, June 2026) that formalizes the [LLM Wiki pattern](/wiki/topics/llm-wiki-pattern/) into a portable, interoperable format. Vendor-neutral, agent- and human-friendly standard for representing metadata, context, and curated knowledge.\n\n## What problem it solves\n\nIn most organizations, the information AI models need is internal knowledge: table schemas, the business meaning of a metric, incident runbooks, join paths between systems, API deprecation notices. These atoms of knowledge live in fragmented systems:\n\n- Metadata catalogs with their own proprietary APIs\n- Wikis, third-party tools, or shared drives\n- Code comments, docstrings, notebook cells\n- The heads of a few senior engineers\n\nWhen an AI agent needs to answer \"How do I compute weekly active users from our event stream?\" it must assemble the answer from scattered, mutually incompatible surfaces. Every catalog vendor reinvents the same data models. The knowledge is locked behind whichever surface created it.\n\n**The result:** Every agent builder solves the same context-assembly problem from scratch. Every wiki produced using the LLM Wiki pattern looks alike (markdown, frontmatter, cross-links) but isn't designed to cooperate. There is no agreed-upon answer to *what fields every document should carry* or *what filenames mean what*.\n\n**What's missing is a format, not another service.** A way to represent knowledge that:\n\n- Anyone can produce, without an SDK\n- Anyone can consume, without an integration\n- Survives moving between systems, organizations, and tools\n- Lives in version control alongside the code it describes\n- Is readable by humans *and* parseable by agents — same file, no translation layer\n\n## Design principles\n\n**1. Minimally opinionated.** OKF requires exactly one thing of every concept: a `type` field. Everything else — what types exist, what other fields to include, what sections the body has — is left to the producer. The spec defines the *interoperability surface*, not the content model.\n\n**2. Producer/consumer independence.** OKF cleanly separates *who writes the knowledge* from *who consumes it*. A bundle hand-authored by a human can be consumed by an AI agent. A bundle generated by a metadata export pipeline can be browsed in a visualizer. A bundle synthesized by one LLM can be queried by another. The format is the contract; the tooling at each end is independently swappable.\n\n**3. Format, not platform.** OKF is not tied to any specific cloud, database, model provider, or agent framework. It will never require a proprietary account or SDK to read, write, or serve. Published as an open standard because the value of a knowledge format comes from how many parties speak it, not from who owns it.\n\n## How it works\n\nAn OKF **bundle** is a directory of markdown files. Each file represents one **concept** — anything you want to capture: a table, a dataset, a metric, a playbook, a runbook, an API. Each concept is one file. The file path is the concept's identity:\n\n```\nsales/\n└── weekly_active_users.md\n```\n\nEach concept document has:\n- A small block of **YAML front matter** for structured fields\n- A **markdown body** for everything else\n\n```markdown\n---\ntype: table\ntitle: Weekly Active Users\ndescription: One row per completed customer order.\nresource: https://console.cloud.google.com/bigquery?p=acme&d=sales&t=orders\ntags: [sales, metrics, core]\ntimestamp: 2026-05-28T14:30:00Z\n---\n\n| Column        | Type      | Description                              |\n|---------------|-----------|------------------------------------------|\n| `order_id`    | STRING    | Globally unique order identifier.        |\n| `customer_id` | STRING    | FK to [customers](/tables/customers.md). |\n\nJoined with [customers](/tables/customers.md) on `customer_id`.\n```\n\nConcepts link to each other with **normal markdown links**, turning the directory into a graph of relationships richer than the parent/child hierarchy implied by the file system.\n\nBundles may optionally include:\n- **index.md** files for progressive disclosure as agents navigate the hierarchy\n- **log.md** files for chronological history of changes\n\nThe full v0.1 specification (conformance criteria, cross-linking rules, reserved filenames) fits on a single page. See [concepts/okf-bundle](/wiki/concepts/okf-bundle/) for the complete anatomy.\n\n## YAML frontmatter fields (v0.1)\n\n| Field | Required | Purpose |\n|---|---|---|\n| `type` | **yes** — the only required field | What kind of concept this is (table, metric, runbook, etc.) |\n| `title` | no | Human-readable name |\n| `description` | no | One-line summary |\n| `resource` | no | External URL (e.g. BigQuery table URL, API endpoint) |\n| `tags` | no | Array of strings for filtering |\n| `timestamp` | no | ISO-8601 last-modified timestamp |\n\nEverything beyond these six fields is the producer's choice — domain-specific extensions are explicitly welcomed.\n\n## What Google shipped with the spec\n\n**Reference implementations** — to make the format concrete and lower the cost of trying it:\n\n- **Enrichment agent** — walks a BigQuery dataset, drafts an OKF concept document for every table and view, then runs a second LLM pass that crawls authoritative documentation and enriches each concept with citations, schemas, and join paths.\n- **Static HTML visualizer** — turns any OKF bundle into an interactive graph view in a single self-contained file. No backend, no install, no data leaves the page.\n- **Three sample bundles** — GA4 e-commerce, Stack Overflow, and Bitcoin public datasets; produced by the reference agent, committed to the repo as conformant OKF examples.\n\nThese are **proofs of concept, deliberately.** The agent demonstrates one way to produce OKF; the format requires no specific agent framework or LLM. The visualizer demonstrates one way to consume it; the format requires no HTML or graph view.\n\nGoogle also updated **Google Cloud Knowledge Catalog** to ingest OKF and serve it to agents.\n\n## Relation to the LLM Wiki pattern\n\nOKF takes [Karpathy's LLM Wiki gist](/wiki/topics/llm-wiki-pattern/) from \"here is a pattern worth following\" to \"here is a format anyone can implement and interoperate with.\" The structural elements map directly:\n\n| LLM Wiki concept | OKF equivalent |\n|---|---|\n| Raw sources | Producer-generated input (stays outside the bundle) |\n| Wiki (markdown pages) | OKF bundle (markdown concepts with frontmatter) |\n| Schema (CLAUDE.md) | OKF spec + producer-defined type vocabulary |\n| index.md | Optional index.md files per directory |\n| log.md | Optional log.md file at root |\n| Cross-links | Standard markdown links between concept files |\n\nThe key addition OKF makes: **interoperability**. Karpathy's wiki and your team's wiki and a vendor's catalog export can now intentionally cooperate. The spec answers \"what fields every document should carry\" with the minimum possible answer (just `type`) and leaves the rest to producers — which is what makes it adoptable across heterogeneous organizations.\n\n## Relation to this wiki (ver-kyker)\n\nver-kyker's wiki already implements the structural core of OKF:\n- Markdown files in a directory hierarchy (`topics/`, `concepts/`)\n- An `index.md` catalog updated on every ingest\n- A `log.md` append-only activity record\n- Cross-links via relative markdown links\n- A schema (CLAUDE.local.md) governing the LLM's maintenance behavior\n\nTo become fully OKF-conformant, ver-kyker would need to:\n1. Add YAML frontmatter with `type` to every concept file\n2. Follow OKF's cross-linking rules (relative paths, not absolute)\n3. Align reserved filenames (`index.md`, `log.md`) — already done\n\nSee [multi-product-wiki-architecture](/wiki/topics/multi-product-wiki-architecture/) for how OKF enables the system Jaco described: a single agent wiki spanning many products with entry points for external content producers.\n\n## Sources\n\n- sources/okf-google-cloud-blog.html\n";</script>

<script>window.__MD__ = "# Incremental Games: Core Loop & Time\n\nPart of the [Incremental Games](/wiki/topics/incremental-games-overview/) research set.\n\n---\n\n## The Canonical Incremental Loop\n\n```\nPRODUCE → ACCUMULATE → SPEND → UPGRADE → PRODUCE FASTER\n```\n\nEvery incremental game is a variation on this cycle. The genre's art is in *how* each step is dressed, paced, and layered.\n\n### Step-by-step breakdown\n\n**1. Produce**\nResources are generated by the player (clicking), by buildings/generators (idle), or by both. Early game almost always starts with active clicking — even in idle-heavy games — so the player understands what the generator represents before the generator replaces them.\n\n**2. Accumulate**\nResources pile up visibly. The counter ticking upward is itself satisfying. This is intentional: the genre discovered that making accumulation *visible* and *legible* is more engaging than hiding it. Cookie Clicker's giant cookie counter and CpS readout are primary UI elements, not secondary stats.\n\n**3. Spend**\nResources are exchanged for upgrades, buildings, or unlocks. The spend decision is where the deepest strategic layer lives: which upgrade next? Should I save for the bigger one or buy now?\n\n**4. Upgrade → Produce Faster**\nUpgrades increase production rate — either linearly (flat +CpS), multiplicatively (×2 to a category), or exponentially (new tier that generates generators). Each upgrade shifts the loop's tempo.\n\n---\n\n## \"Numbers Going Up\" Is the Mechanic\n\nIn most games, numbers are feedback about progress. In incrementals, the rising number *is* the progress. The genre owes this insight to Progress Quest (2002), which proved players would watch an automated bar fill without any input at all — just to see what happened next.\n\nCookie Clicker designer Orteil has called his games \"non-games\" — but the compulsive engagement proves that watching a counter accelerate satisfies something real. Academic analysis frames it as:\n\n- **Variable ratio reinforcement** (unpredictable reward timing keeps engagement high)\n- **Dopamine anticipation loop**: Action → Reward → \"Just a bit more until the next upgrade\" → Repeat\n- **Mathematical appreciation**: exponentially accelerating numbers feel like a small discovery each time\n\n---\n\n## Time as a Core Resource\n\nIn most games, time is the medium. In incrementals, **time is the cost**. Wait times are the primary friction — the equivalent of health points or stamina bars.\n\nThis has structural implications:\n\n| Time role | Example |\n|-----------|---------|\n| **Early game cost**: wait 10 seconds to afford next building | Cookie Clicker cursor → grandma |\n| **Mid-game cost**: wait 20 minutes for the next tier | Cookie Clicker shipment |\n| **Prestige signal**: growth so slow that 1 hour = 0.01% of next upgrade | The \"wall\" — time to reset |\n| **Offline resource**: time accumulates as production while away | AdVenture Capitalist, Egg Inc. |\n\nDesigning around time-as-cost means:\n- Each new tier should feel like a meaningful amount of time has passed (not too fast = no appreciation; not too slow = boredom)\n- Cookie Clicker's buildings each cost ~5× the previous; income per tier increases by ~1/3 — calibrated so players dwell in each tier long enough to enjoy it\n\n---\n\n## Active vs. Passive Income\n\nMost incrementals support two modes simultaneously:\n\n**Active income**: generated by clicking. High rate but requires attention.\n**Passive income**: generated by buildings/automation. Lower initial rate but continuous.\n\nThe balance shifts over the game's arc:\n- **Early**: active dominates. Clicking is the only income. This teaches the player what they're building toward.\n- **Mid**: passive catches up. Buildings accumulate. Clicking becomes a boost, not a necessity.\n- **Late**: passive completely dominates. Active clicking may still provide a bonus (typically 1–5% of passive rate), but is no longer required.\n\nWell-designed games don't punish idleness or punish active play — they reward both, just differently.\n\n**Active player advantage**: may access mini-games (Cookie Clicker's garden, stock market), golden cookie clicks, click-burst upgrades.\n**Idle player advantage**: offline production, lower cognitive load, lower session frequency.\n\n---\n\n## Offline Progress\n\nWhen the player leaves and returns, the game calculates:\n\n```\ngained = production_per_second × elapsed_seconds\n```\n\nThis \"delta-time\" calculation fast-forwards game state without running a background server. The math is applied on login.\n\n**Design decisions around offline progress:**\n\n| Decision | Effect |\n|----------|--------|\n| **Cap offline hours** (e.g. 8h cap) | Encourages regular check-ins; prevents single session from fully \"solving\" the game |\n| **No cap** | Reduces anxiety; rewards long breaks; less monetization pressure |\n| **Offline efficiency penalty** (e.g. 50% rate) | Incentivizes active play; common in mobile F2P |\n| **Offline bonus** (e.g. return bonus popup) | Makes returning feel rewarding; reduces guilt about absences |\n\nEgg, Inc. caps offline at 2 hours by default (premium extends this), which is explicitly designed to encourage either active play or premium purchase.\n\n**Why offline progress matters to design:**\n1. Reduces anxiety (\"I'm falling behind\") — key for retention\n2. Makes returning feel rewarding vs. punishing\n3. Lets the game fit into a life, not demand it\n4. Creates natural FOMO loop: \"Come back to see what you earned\"\n\n---\n\n## See Also\n\n- [Resource Systems](/wiki/topics/incremental-games-resources/)\n- [Prestige Mechanics](/wiki/topics/incremental-games-prestige/)\n- [Pacing & Engagement](/wiki/topics/incremental-games-pacing/)\n\n## Sources\n- incremental-games-research.md\n";</script>

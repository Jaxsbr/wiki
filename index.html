<script>window.__MD__ = "# ver-kyker Research Wiki — Index\n\n> Catalog of every page in this wiki, one line each. Updated on every ingest.\n> Browse at https://jaxsbr.github.io/wiki/\n\n## Meta\n\n- [requests](/wiki/requests/) — registry of all research requests; check here before starting new research\n- [log](/wiki/log/) — append-only activity log (ingests, queries, lint passes)\n\n## Agentic Engineering\n\n- [agentic-orthogonal-shift](/wiki/topics/agentic-orthogonal-shift/) — The T3→T4 centerpiece: what rotates, why hard for engineers, Two-Engineer Comparison, Four Mindset Inversions, Six Transition-2 Competencies, QA transformation, both failure poles, crossing drills, tells\n\n## Topics\n\n- [vector-search-hybrid-retrieval](/wiki/topics/vector-search-hybrid-retrieval/) — why cosine-only search fails; the layered BM25 + vector + RRF + cross-encoder production stack\n- [ai-slop-web-design](/wiki/topics/ai-slop-web-design/) — overview of AI-generated website generic patterns and prevention; links to all four concept pages\n\n## Concepts\n\n- [bm25](/wiki/concepts/bm25/) — probabilistic keyword ranking: IDF, TF saturation, length normalisation\n- [reciprocal-rank-fusion](/wiki/concepts/reciprocal-rank-fusion/) — rank-based fusion of multiple retriever lists; no score normalisation needed\n- [cross-encoder-reranking](/wiki/concepts/cross-encoder-reranking/) — joint query-document scoring for final relevance on small candidate sets\n- [ai-slop-visual-patterns](/wiki/concepts/ai-slop-visual-patterns/) — detectable typography, colour, layout, animation, and copy tells in AI-generated sites\n- [anti-slop-design-system](/wiki/concepts/anti-slop-design-system/) — design system specification as the primary technique for distinctive AI-assisted design\n- [anti-slop-prompting](/wiki/concepts/anti-slop-prompting/) — prompt engineering techniques: core anti-slop prompt, negative constraints, component templates\n- [first-game-scope](/wiki/concepts/first-game-scope/) — scope rules, one-mechanic principle, genre × skill matrix, engine choice, marketing minimum for first game\n\n- [solo-dev-on-steam](/wiki/topics/solo-dev-on-steam/) — how average-skilled solo devs succeed on Steam; honest constraint analysis for \"few hours/day\" + engine/genre/marketing guide\n- [solo-dev-success-stories](/wiki/topics/solo-dev-success-stories/) — 20 documented solo/micro-team Steam successes with dev backgrounds, revenue, and what worked\n- [indie-game-contests](/wiki/topics/indie-game-contests/) — landscape of 10 major contests (IGF, TGA, BAFTA, IndieCade, BitSummit, jams); overview and contest-level winner tables\n- [indie-contest-winners](/wiki/topics/indie-contest-winners/) — full year-by-year winner records 2020–2025 across all major contests\n- [indie-winning-recipes](/wiki/topics/indie-winning-recipes/) — pattern analysis: winning genres, art styles, mechanics, themes, team sizes, and the \"one mechanic explored deeply\" formula\n- [indie-engines-frameworks](/wiki/topics/indie-engines-frameworks/) — Unity vs Godot vs GameMaker vs custom; Godot's rapid rise post-Unity pricing shock\n- [pixel-art-topdown-scene-layout](/wiki/topics/pixel-art-topdown-scene-layout/) — how designers lay out top-down 2D scenes: perspective rules, trees/paths/buildings/rivers/caves/mountains, composition principles, AI training quick-reference\n\n- [arena-survivor-overview](/wiki/topics/arena-survivor-overview/) — genre synthesis hub: formula, key games, design principles, non-negotiables; links to all three deep-dive pages\n- [arena-survivor-visual-design](/wiki/topics/arena-survivor-visual-design/) — art styles, camera perspectives, VFX, UI/HUD, and enemy design principles across VS, Brotato, HoloCure, 20MTD, HoT, DRGS\n- [arena-survivor-mechanics](/wiki/topics/arena-survivor-mechanics/) — core loop, weapons, evolutions, enemy scaling, meta-progression, movement, resources, run modifiers — per-game attribution across 8 games\n- [arena-survivor-skill-design](/wiki/topics/arena-survivor-skill-design/) — how the genre teaches and rewards skill; 8-dimension analysis across VS, Brotato, 20MTD, HoloCure, DRG:Survivor, HoT\n\n## Demos\n\n- [ai-slop.html](https://jaxsbr.github.io/wiki/demos/ai-slop.html) — annotated \"canonical AI slop\" landing page with 13 labelled tells\n- [good-design.html](https://jaxsbr.github.io/wiki/demos/good-design.html) — same content redesigned with distinctive typography and deliberate choices\n- [art-styles.html](https://jaxsbr.github.io/wiki/demos/art-styles.html) — visual showcase of 17 award-winning indie games grouped by art style; screenshots + trailer link cards\n\n## Incremental / Idle Games (R-008)\n\n- [incremental-games-overview](/wiki/topics/incremental-games-overview/) — hub: genre definition, spectrum, history 2002–2021, canonical loop; links to all sub-pages\n- [incremental-games-core-loop](/wiki/topics/incremental-games-core-loop/) — produce→accumulate→spend cycle; \"numbers going up\" as mechanic; time as cost; active/passive income; offline progress\n- [incremental-games-resources](/wiki/topics/incremental-games-resources/) — primary/secondary/prestige currency tiers; generators; Kittens Game conversion chain; soft caps; diminishing returns\n- [incremental-games-upgrades](/wiki/topics/incremental-games-upgrades/) — linear/multiplicative/exponential tiers; milestones; tree vs. list; psychology of \"one more upgrade\"\n- [incremental-games-prestige](/wiki/topics/incremental-games-prestige/) — prestige as genre innovation; first-prestige design; currency formulas (5 games); multi-layer systems (AD/CH/RG); anti-frustration design\n- [incremental-games-scaling](/wiki/topics/incremental-games-scaling/) — big number notation (K/M/B/T, AA/AB, scientific, log); cost curve formulas; walls as design tool; float precision limits\n- [incremental-games-automation](/wiki/topics/incremental-games-automation/) — automation arc (manual→auto→meta-auto); 4 unlock pattern types; milestone rewards; auto-buyer design\n- [incremental-games-recipes](/wiki/topics/incremental-games-recipes/) — 7 structural templates: Cookie Clicker, Antimatter Dimensions, Kittens Game, Universal Paperclips, AdVenture Capitalist, Incremental RPG (Melvor/NGU/CH), A Dark Room\n- [incremental-games-pacing](/wiki/topics/incremental-games-pacing/) — unlock cadence; mid-game doldrums (causes + solutions); offline catch-up; daily login design; end-game problem\n- [incremental-games-monetization](/wiki/topics/incremental-games-monetization/) — ethical patterns; predatory patterns; designer ethics test; clean implementations\n- [incremental-game-psychology](/wiki/topics/incremental-game-psychology/) — 10-section psychology (VRR, number salience, autonomy paradox, Zeigarnik, prestige, pacing/flow, discovery, identity, social, dark patterns) + 15 design principles\n- [incremental-games-catalogue](/wiki/topics/incremental-games-catalogue/) — 30-game deep-dive: Pioneering/Classic, Browser/PC, Steam, Mobile, Hybrid; Steam IDs, header images, quick-reference table\n- [incremental-games-mechanics](/wiki/topics/incremental-games-mechanics/) — 7 core mechanics, prestige formula ranges, idle vs. active design, genre taxonomy, quality rubric\n- [incremental-progression-examples](/wiki/topics/incremental-progression-examples/) — 10 concrete progression sequences with real numbers (Cookie Clicker, AD, Egg Inc, Clicker Heroes, Kittens Game, AdCap, NGU Idle, Trimps, Universal Paperclips, Vampire Survivors)\n- [prestige-loop](/wiki/concepts/prestige-loop/) — prestige deep-dive: emotional arc, loss aversion reframing, formulas (Cookie Clicker/AdCap/RG/Egg Inc), layered systems (AD/RG/CH), 6 design rules\n- [incremental-genre-fusion](/wiki/concepts/incremental-genre-fusion/) — incremental × RPG (Melvor/NGU/Idle Champions), × strategy (Kittens/Factorio), × narrative (A Dark Room/Universal Paperclips), × action (VS) — arcs, failure modes, fusion design test\n\n## Atomic Physics for Game Design (R-007)\n\n- [atomic-physics-for-game-design](/wiki/topics/atomic-physics-for-game-design/) — hub: jargon quick-reference, four-force table, 19-mechanic design theme index; links to all six deep-dives\n- [atomic-structure](/wiki/topics/atomic-structure/) — subatomic particles (quarks → muons), electron shells (K/L/M/N), orbitals (s/p/d/f), quantum numbers, nuclear structure\n- [atomic-behaviors](/wiki/topics/atomic-behaviors/) — four fundamental forces, electron excitation/ionization/spectra, radioactive decay (α/β/γ/chains), fission/fusion/reactor components, chemical bonding\n- [atomic-quantum](/wiki/topics/atomic-quantum/) — wave-particle duality, Heisenberg uncertainty, superposition, entanglement, tunneling, Pauli exclusion, decoherence; game-mechanic translation table\n- [atomic-energy-radiation](/wiki/topics/atomic-energy-radiation/) — EM spectrum, radiation types and dose units (Bq/Gy/Sv), E=mc², binding energy curve, periodic table, 9 key elements for game design\n- [atomic-visual-design](/wiki/topics/atomic-visual-design/) — game artist reference: Bohr model, orbitals, emission spectra, bubble chambers, Feynman diagrams; film refs (Oppenheimer, Kurzgesagt, 3Blue1Brown); CPK color table; Cherenkov blue; 4 visual directions (Scientific Realism / Retro Atomic / Quantum Abstract / Nuclear Industrial) with palettes and comparable games\n- [atomic-game-design-catalogue](/wiki/topics/atomic-game-design-catalogue/) — 15 atom/physics games catalogued (SpaceChem, Opus Magnum, Nuclear Throne, Quantum Chess, etc.); 10 atomic concepts → concrete mechanics; 7 genre fit ratings; realism spectrum; arena survivor concept \"VALENCE\"\n\n## Entities\n\n_(no entity pages yet)_\n";</script>

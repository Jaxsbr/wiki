cess-stories](/wiki/topics/solo-dev-success-stories/) — 20 documented solo/micro-team Steam successes with dev backgrounds, revenue, and what worked\n- [indie-game-contests](/wiki/topics/indie-game-contests/) — landscape of 10 major contests (IGF, TGA, BAFTA, IndieCade, BitSummit, jams); overview and contest-level winner tables\n- [indie-contest-winners](/wiki/topics/indie-contest-winners/) — full year-by-year winner records 2020–2025 across all major contests\n- [indie-winning-recipes](/wiki/topics/indie-winning-recipes/) — pattern analysis: winning genres, art styles, mechanics, themes, team sizes, and the \"one mechanic explored deeply\" formula\n- [indie-engines-frameworks](/wiki/topics/indie-engines-frameworks/) — Unity vs Godot vs GameMaker vs custom; Godot's rapid rise post-Unity pricing shock\n- [pixel-art-topdown-scene-layout](/wiki/topics/pixel-art-topdown-scene-layout/) — how designers lay out top-down 2D scenes: perspective rules, trees/paths/buildings/rivers/caves/mountains, composition principles, AI training quick-reference\n\n- [arena-survivor-overview](/wiki/topics/arena-survivor-overview/) — genre synthesis hub: formula, key games, design principles, non-negotiables; links to all three deep-dive pages\n- [arena-survivor-visual-design](/wiki/topics/arena-survivor-visual-design/) — art styles, camera perspectives, VFX, UI/HUD, and enemy design principles across VS, Brotato, HoloCure, 20MTD, HoT, DRGS\n- [arena-survivor-mechanics](/wiki/topics/arena-survivor-mechanics/) — core loop, weapons, evolutions, enemy scaling, meta-progression, movement, resources, run modifiers — per-game attribution across 8 games\n- [arena-survivor-skill-design](/wiki/topics/arena-survivor-skill-design/) — how the genre teaches and rewards skill; 8-dimension analysis across VS, Brotato, 20MTD, HoloCure, DRG:Survivor, HoT\n\n## Demos\n\n- [ai-slop.html](https://jaxsbr.github.io/wiki/demos/ai-slop.html) — annotated \"canonical AI slop\" landing page with 13 labelled tells\n-

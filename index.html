cs/solo-dev-success-stories/) — 20 documented solo/micro-team Steam successes with dev backgrounds, revenue, and what worked\n- [indie-game-contests](/wiki/topics/indie-game-contests/) — landscape of 10 major contests (IGF, TGA, BAFTA, IndieCade, BitSummit, jams); overview and contest-level winner tables\n- [indie-contest-winners](/wiki/topics/indie-contest-winners/) — full year-by-year winner records 2020–2025 across all major contests\n- [indie-winning-recipes](/wiki/topics/indie-winning-recipes/) — pattern analysis: winning genres, art styles, mechanics, themes, team sizes, and the \"one mechanic explored deeply\" formula\n- [indie-engines-frameworks](/wiki/topics/indie-engines-frameworks/) — Unity vs Godot vs GameMaker vs custom; Godot's rapid rise post-Unity pricing shock\n- [pixel-art-topdown-scene-layout](/wiki/topics/pixel-art-topdown-scene-layout/) — how designers lay out top-down 2D scenes: perspective rules, trees/paths/buildings/rivers/caves/mountains, composition principles, AI training quick-reference\n\n## Demos\n\n- [ai-slop.html](/wiki/demos/ai-slop.html) — annotated \"canonical AI slop\" landing page with 13 labelled tells\n- [good-design.html](/wiki/demos/good-design.html) — same content redesigned with distinctive typography and deliberate choices\n- [art-styles.html](/wiki/demos/art-styles.html) — visual showcase of 17 award-winning indie games grouped by art style; screenshots + trailer link cards\n\n## Entities\n\n_(no entity pages yet)_\n";</script>

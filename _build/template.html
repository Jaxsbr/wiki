<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230a0a0c'/%3E%3Ctext x='8' y='12.5' text-anchor='middle' font-size='12' fill='%23c4a35a'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/_assets/observatory.css">

<body>
<div id="scene" aria-hidden="true">

  <div data-depth="0.50" class="layer stars" data-stars="26" data-size="2.5"></div>

<nav class="crumb">
  <span class="brand">ver-kyker</span><span class="sep">·</span>

  <a href="/requests">requests</a><span class="sep">·</span>
  <a href="/log">log</a>
</nav>
<main id="content"></main>
<footer class="statsbar">
  <span class="stat"><span class="stat-label">pages</span><span class="stat-value">{{PAGES}}</span></span>
  <span class="stat"><span class="stat-label">requests</span><span class="stat-value">{{REQUESTS}}</span></span>
  <span class="stat"><span class="stat-label">last entry</span><span class="stat-value">{{LAST}}</span></span>
  <span class="stat obs">✦ research observatory</span>
</footer>
<script src="/_assets/marked.min.js"></script>
<script src="/_assets/parallax.min.js"></script>
<script>window.__MD__ = {{MD_JSON}};</script>

</html>
